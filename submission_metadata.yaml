methodology_summary: "Hybrid ranker using BM25 over concatenated profile text (headline, summary, career, skills, education) combined with strong behavioral signals from redrob_signals (open_to_work, recruiter_response_rate, profile_views, recency, etc.), JD-specific keyword/phrase overlap on production retrieval & ranking terms, career trajectory fit (build/ship language + anti-consulting penalty), and experience band fit (target 5-9 yrs). Scores are a weighted blend; final ranking uses rank-derived normalized scores with non-increasing property."

